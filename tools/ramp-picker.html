<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mydiodia — Ramp Picker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 13px; color: #1a2530; }
    #app { display: flex; height: 100vh; }
    #sidebar { width: 380px; flex-shrink: 0; background: #f5f7fa; border-right: 1px solid #d8dde2; overflow-y: auto; padding: 16px; }
    #map { flex: 1; }
    h1 { font-size: 16px; margin: 0 0 4px 0; color: #2a6b9e; }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6a7785; margin: 18px 0 6px 0; font-weight: 600; }
    .meta { font-size: 11px; color: #6a7785; margin-bottom: 14px; }
    .control-row { margin-bottom: 10px; }
    select, button, textarea { font: inherit; }
    select { width: 100%; padding: 8px; border: 1px solid #c5cdd6; border-radius: 6px; background: white; }
    select option.done { color: #2d7a3a; }
    select option.partial { color: #b8860b; }

    .basemap-toggle { display: flex; gap: 4px; }
    .basemap-toggle button { flex: 1; padding: 6px; border: 1px solid #c5cdd6; background: white; border-radius: 5px; cursor: pointer; font-size: 11px; }
    .basemap-toggle button.active { background: #2a6b9e; color: white; border-color: #2a6b9e; }

    .toll-info { background: white; padding: 10px; border-radius: 6px; border: 1px solid #d8dde2; margin-bottom: 14px; }
    .toll-info .toll-id { font-family: ui-monospace, monospace; font-size: 11px; color: #6a7785; }
    .toll-info .toll-name { font-weight: 600; margin: 2px 0; }
    .toll-info .toll-coord { font-family: ui-monospace, monospace; font-size: 10.5px; color: #6a7785; }
    .toll-info .toll-status { font-size: 11px; color: #b8860b; margin-top: 4px; }
    .toll-info .toll-status.null-bypass { color: #b8502d; }

    .dir-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .dir-tab { flex: 1; padding: 8px; border: 1px solid #c5cdd6; background: white; border-radius: 5px; cursor: pointer; font-weight: 500; }
    .dir-tab.active { background: #2a6b9e; color: white; border-color: #2a6b9e; }
    .dir-tab .dir-progress { font-size: 10px; opacity: 0.85; }

    .dir-toggle-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .dir-toggle-row label { display: flex; align-items: center; gap: 4px; font-size: 11.5px; cursor: pointer; padding: 4px 8px; background: white; border: 1px solid #c5cdd6; border-radius: 4px; }
    .dir-toggle-row label input { margin: 0; }

    .pick-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }

    .name-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .name-fields label { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: #6a7785; }
    .name-fields input { padding: 6px 8px; border: 1px solid #c5cdd6; border-radius: 4px; font: inherit; font-size: 12px; }
    .name-fields input:focus { border-color: #2a6b9e; outline: none; }
    .pick-btn { padding: 10px 8px; border: 2px solid #c5cdd6; background: white; border-radius: 6px; cursor: pointer; text-align: left; }
    .pick-btn .pick-btn-label { font-weight: 600; font-size: 12px; }
    .pick-btn .pick-btn-coord { font-family: ui-monospace, monospace; font-size: 10px; color: #6a7785; margin-top: 2px; }
    .pick-btn .pick-btn-coord.empty { color: #b8502d; }
    .pick-btn.armed { border-color: #2a6b9e; background: #eaf3fa; box-shadow: 0 0 0 3px rgba(42,107,158,0.15); }
    .pick-btn.filled { border-color: #2d7a3a; }

    .json-out { width: 100%; min-height: 200px; padding: 8px; font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; border: 1px solid #c5cdd6; border-radius: 6px; background: #fafbfc; resize: vertical; }
    .btn-row { display: flex; gap: 6px; margin-top: 8px; }
    .btn-row button { flex: 1; padding: 8px; border: 1px solid #c5cdd6; background: white; border-radius: 5px; cursor: pointer; font-weight: 500; }
    .btn-row button.primary { background: #2a6b9e; color: white; border-color: #2a6b9e; }
    .btn-row button.danger { background: #b8502d; color: white; border-color: #b8502d; }
    .btn-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .session-log { font-size: 11px; color: #6a7785; margin-top: 6px; }
    .session-log .log-toll { display: block; padding: 2px 0; }
    .session-log .log-toll.done { color: #2d7a3a; }

    /* Map cursor when armed */
    .map-armed .leaflet-grab { cursor: crosshair !important; }
    .map-armed .leaflet-grab:active { cursor: crosshair !important; }

    /* Custom marker styles */
    .pick-marker { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.4); border-radius: 50%; width: 22px; height: 22px; }
    .pick-marker.pre   { background: #2a6b9e; }
    .pick-marker.off   { background: #b8502d; }
    .pick-marker.on    { background: #b8860b; }
    .pick-marker.post  { background: #2d7a3a; }
    .toll-marker { width: 14px; height: 14px; border-radius: 50%; background: #1a2530; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    .hint { font-size: 11px; color: #6a7785; line-height: 1.45; padding: 8px; background: #fff8e6; border-radius: 4px; border-left: 3px solid #b8860b; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>Ramp Picker</h1>
      <div class="meta" id="meta">Loading toll data…</div>

      <h2>Basemap</h2>
      <div class="basemap-toggle control-row" id="basemap-toggle">
        <button data-mode="streets" class="active">Streets</button>
        <button data-mode="satellite">Satellite</button>
        <button data-mode="hybrid">Hybrid</button>
      </div>

      <h2>Toll in scope</h2>
      <div class="control-row">
        <select id="toll-select"></select>
      </div>

      <div id="toll-area" style="display: none;">
        <div class="toll-info" id="toll-info"></div>

        <h2>Directions</h2>
        <div class="dir-toggle-row" id="dir-toggle-row"></div>

        <div class="dir-tabs" id="dir-tabs"></div>

        <div class="hint">
          Click a button below to arm it, then click on the map to place that point. The 4 ramp coords define the bypass for this direction.
        </div>

        <div class="name-fields" id="name-fields"></div>

        <div class="pick-btn-row" id="pick-btn-row"></div>

        <div class="btn-row" style="margin-top: 4px;">
          <button id="clear-dir-btn">Clear this direction</button>
        </div>

        <h2>Output (paste into data/tolls.js)</h2>
        <textarea class="json-out" id="json-out" readonly placeholder="Pick the 4 points to see the JSON…"></textarea>
        <div class="btn-row">
          <button id="copy-btn">Copy JSON</button>
          <button class="primary" id="save-btn">Save & next →</button>
        </div>

        <h2>Session log</h2>
        <div class="session-log" id="session-log">No tolls saved yet.</div>
        <div class="btn-row">
          <button id="export-btn">Download session</button>
          <button class="danger" id="reset-btn">Reset session</button>
        </div>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────
    const HIGHWAY_AXIS = {
      A1: 'NS', A2: 'EW', A5: 'NS', A6: 'EW', A7: 'NS', A8: 'EW', E65: 'NS', BRIDGE: 'NS',
    };
    // Tolls that override the default axis (branches off the main alignment)
    const TOLL_AXIS_OVERRIDE = {
      egnatia_ieropigi:   'NS',  // branch toward Albanian border
      egnatia_promahonas: 'NS',  // branch toward Bulgarian border
    };
    const POINT_KEYS  = ['pre_exit', 'off_ramp', 'on_ramp', 'post_merge'];
    const POINT_LABELS = {
      pre_exit:   { num: 1, label: 'Pre-exit',   short: 'pre',  hint: 'Last point on motorway before off-ramp' },
      off_ramp:   { num: 2, label: 'Off-ramp',   short: 'off',  hint: 'First turn off the motorway' },
      on_ramp:    { num: 3, label: 'On-ramp',    short: 'on',   hint: 'Last turn back onto the motorway' },
      post_merge: { num: 4, label: 'Post-merge', short: 'post', hint: 'First point on motorway after on-ramp' },
    };

    // ── Identify in-scope tolls ───────────────────────────────
    const tolls = TOLL_DATA;
    const inScope = tolls.filter(t => {
      if (t.type !== 'frontal') return false;
      if (!t.bypass_directions) return true;
      const dirs = Object.values(t.bypass_directions);
      return dirs.some(d => d.confidence === 'approximate');
    });

    document.getElementById('meta').textContent =
      `${inScope.length} frontal tolls in scope (${tolls.filter(t => t.type === 'frontal' && !t.bypass_directions).length} null + ${tolls.filter(t => t.type === 'frontal' && t.bypass_directions && Object.values(t.bypass_directions).some(d => d.confidence === 'approximate')).length} approximate)`;

    // ── Map setup ─────────────────────────────────────────────
    const map = L.map('map', { center: [38.5, 22.5], zoom: 7, zoomControl: true });

    const STREET_LAYER = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      { attribution: '&copy; OSM &copy; CARTO', subdomains: 'abcd', maxZoom: 19 }
    );
    const SATELLITE_LAYER = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { attribution: 'Tiles &copy; Esri', maxZoom: 19 }
    );
    map.createPane('basemapLabels');
    map.getPane('basemapLabels').style.zIndex = 350;
    map.getPane('basemapLabels').style.pointerEvents = 'none';
    const SATELLITE_LABELS = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      { attribution: '', maxZoom: 19, pane: 'basemapLabels' }
    );

    let basemapMode = 'streets';
    STREET_LAYER.addTo(map);
    document.querySelectorAll('#basemap-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        if (mode === basemapMode) return;
        // Remove existing
        if (basemapMode === 'streets') map.removeLayer(STREET_LAYER);
        if (basemapMode === 'satellite' || basemapMode === 'hybrid') map.removeLayer(SATELLITE_LAYER);
        if (basemapMode === 'hybrid') map.removeLayer(SATELLITE_LABELS);
        // Add new
        if (mode === 'streets') STREET_LAYER.addTo(map);
        if (mode === 'satellite') SATELLITE_LAYER.addTo(map);
        if (mode === 'hybrid') { SATELLITE_LAYER.addTo(map); SATELLITE_LABELS.addTo(map); }
        basemapMode = mode;
        document.querySelectorAll('#basemap-toggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      });
    });

    // ── State ─────────────────────────────────────────────────
    // Storage schema (current):
    //   session[tollId] = {
    //     workData:   { north: {pre_exit, off_ramp, on_ramp, post_merge, __names}, south: {...} },
    //     activeDirs: ['north', 'south'],
    //     output:     '<the JSON snippet shown in the textarea>'
    //   }
    //
    // Older sessions (pre-fix) stored `__activeDirs` and `__output` as keys
    // *inside* the workData object alongside the direction keys, which then
    // leaked back into `activeDirs` on reload and corrupted further saves.
    // We detect and discard any such legacy entries on load so corrupted
    // state doesn't persist.
    let session = {};
    try {
      const raw = JSON.parse(localStorage.getItem('rampPicker.session') || '{}');
      Object.entries(raw).forEach(([id, val]) => {
        if (val && typeof val === 'object' && val.workData && Array.isArray(val.activeDirs)) {
          session[id] = val;  // current schema, OK
        }
        // Anything else (legacy) is silently dropped. Re-pick if needed.
      });
    } catch {
      session = {};
    }
    let currentToll = null;
    let currentDir = null; // 'north' | 'south' | 'east' | 'west'
    let armedField = null; // 'pre_exit' | 'off_ramp' | 'on_ramp' | 'post_merge' | null
    let activeDirs = []; // for current toll, e.g. ['north','south']
    let workData = {}; // { dirKey: { pre_exit: {lat,lng}, off_ramp: {...}, ... } }
    let tollMarker = null;
    let pickMarkers = {}; // { dirKey: { pre_exit: marker, ... } }

    function persistSession() {
      localStorage.setItem('rampPicker.session', JSON.stringify(session));
    }

    // ── Toll dropdown ─────────────────────────────────────────
    const sel = document.getElementById('toll-select');
    function renderDropdown() {
      sel.innerHTML = '<option value="">— pick a toll —</option>';
      inScope.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        const isDone = !!session[t.id];
        const reason = !t.bypass_directions ? '[null]' : '[approx]';
        opt.textContent = `${isDone ? '✓ ' : ''}${t.id} — ${t.name_en} ${reason}`;
        if (isDone) opt.className = 'done';
        sel.appendChild(opt);
      });
    }
    renderDropdown();
    sel.addEventListener('change', e => {
      const id = e.target.value;
      if (!id) { hideTollArea(); return; }
      loadToll(id);
    });

    function hideTollArea() {
      document.getElementById('toll-area').style.display = 'none';
      if (tollMarker) { map.removeLayer(tollMarker); tollMarker = null; }
      clearAllPickMarkers();
      currentToll = null;
      currentDir = null;
      armedField = null;
      workData = {};
    }

    // ── Direction inference ───────────────────────────────────
    function getDefaultAxis(toll) {
      return TOLL_AXIS_OVERRIDE[toll.id] || HIGHWAY_AXIS[toll.highway] || 'NS';
    }
    function getDefaultDirs(toll) {
      const axis = getDefaultAxis(toll);
      return axis === 'NS' ? ['north', 'south'] : ['east', 'west'];
    }
    const ALL_DIRS = ['north', 'south', 'east', 'west'];

    // ── Load a toll ───────────────────────────────────────────
    function loadToll(id) {
      const toll = inScope.find(t => t.id === id);
      if (!toll) return;
      currentToll = toll;
      armedField = null;
      clearAllPickMarkers();

      // Pre-load any in-progress work from localStorage session
      const saved = session[id];
      workData = saved ? JSON.parse(JSON.stringify(saved.workData)) : {};
      activeDirs = saved && saved.activeDirs.length ? saved.activeDirs.slice() : getDefaultDirs(toll);

      // Toll info
      const reason = !toll.bypass_directions ? 'null bypass' : 'has approximate direction';
      const reasonClass = !toll.bypass_directions ? 'null-bypass' : '';
      document.getElementById('toll-info').innerHTML = `
        <div class="toll-id">${toll.id}</div>
        <div class="toll-name">${toll.name_en}</div>
        <div class="toll-coord">${toll.lat.toFixed(6)}, ${toll.lng.toFixed(6)} · ${toll.highway}</div>
        <div class="toll-status ${reasonClass}">${reason}</div>
      `;

      renderDirectionToggles();
      currentDir = activeDirs[0];
      renderDirTabs();
      renderPickButtons();
      renderNameFields();
      updateJSONOutput();

      // Show the area, fly to the toll
      document.getElementById('toll-area').style.display = 'block';
      if (tollMarker) map.removeLayer(tollMarker);
      tollMarker = L.marker([toll.lat, toll.lng], {
        icon: L.divIcon({ className: '', html: '<div class="toll-marker"></div>', iconSize: [14,14], iconAnchor: [7,7] }),
      }).addTo(map);
      map.flyTo([toll.lat, toll.lng], 14, { duration: 0.6 });

      // Restore any pick markers from previous session
      activeDirs.forEach(d => {
        if (!workData[d]) return;
        POINT_KEYS.forEach(k => {
          if (workData[d][k]) {
            placePickMarker(d, k, workData[d][k].lat, workData[d][k].lng);
          }
        });
      });
    }

    // ── Direction toggle row ──────────────────────────────────
    function renderDirectionToggles() {
      const row = document.getElementById('dir-toggle-row');
      row.innerHTML = '';
      ALL_DIRS.forEach(d => {
        const lbl = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = activeDirs.includes(d);
        cb.addEventListener('change', () => {
          if (cb.checked) {
            if (!activeDirs.includes(d)) activeDirs.push(d);
          } else {
            activeDirs = activeDirs.filter(x => x !== d);
            // Clear data and markers for this direction
            delete workData[d];
            if (pickMarkers[d]) {
              Object.values(pickMarkers[d]).forEach(m => map.removeLayer(m));
              delete pickMarkers[d];
            }
          }
          if (!activeDirs.includes(currentDir)) currentDir = activeDirs[0] || null;
          renderDirTabs();
          renderPickButtons();
          renderNameFields();
          updateJSONOutput();
        });
        lbl.appendChild(cb);
        lbl.appendChild(document.createTextNode(' ' + d));
        row.appendChild(lbl);
      });
    }

    // ── Direction tabs ────────────────────────────────────────
    function renderDirTabs() {
      const tabs = document.getElementById('dir-tabs');
      tabs.innerHTML = '';
      activeDirs.forEach(d => {
        const filled = workData[d] ? POINT_KEYS.filter(k => workData[d][k]).length : 0;
        const tab = document.createElement('div');
        tab.className = 'dir-tab' + (d === currentDir ? ' active' : '');
        tab.innerHTML = `${d} <span class="dir-progress">${filled}/4</span>`;
        tab.addEventListener('click', () => {
          currentDir = d;
          armedField = null;
          renderDirTabs();
          renderPickButtons();
          renderNameFields();
        });
        tabs.appendChild(tab);
      });
    }

    // ── Name fields (exit_name, entry_name) ───────────────────
    function renderNameFields() {
      const wrap = document.getElementById('name-fields');
      wrap.innerHTML = '';
      if (!currentDir) return;
      const names = (workData[currentDir] && workData[currentDir].__names) || {};
      ['exit_name', 'entry_name'].forEach(field => {
        const lbl = document.createElement('label');
        const labelText = field === 'exit_name' ? 'Exit name (optional)' : 'Entry name (optional)';
        lbl.innerHTML = `<span>${labelText}</span>`;
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = field === 'exit_name' ? 'e.g. Ριτσώνας' : 'e.g. Θήβας';
        input.value = names[field] || '';
        input.addEventListener('input', e => {
          if (!workData[currentDir]) workData[currentDir] = {};
          if (!workData[currentDir].__names) workData[currentDir].__names = {};
          workData[currentDir].__names[field] = e.target.value.trim();
          updateJSONOutput();
        });
        lbl.appendChild(input);
        wrap.appendChild(lbl);
      });
    }

    // ── Pick buttons ──────────────────────────────────────────
    function renderPickButtons() {
      const row = document.getElementById('pick-btn-row');
      row.innerHTML = '';
      if (!currentDir) return;
      const dirData = workData[currentDir] || {};
      POINT_KEYS.forEach(k => {
        const btn = document.createElement('button');
        const filled = !!dirData[k];
        const armed = armedField === k;
        btn.className = 'pick-btn' + (armed ? ' armed' : '') + (filled ? ' filled' : '');
        const coordStr = filled ? `${dirData[k].lat.toFixed(5)}, ${dirData[k].lng.toFixed(5)}` : 'click to arm';
        btn.innerHTML = `
          <div class="pick-btn-label">${POINT_LABELS[k].num}. ${POINT_LABELS[k].label}</div>
          <div class="pick-btn-coord ${filled ? '' : 'empty'}">${coordStr}</div>
        `;
        btn.title = POINT_LABELS[k].hint;
        btn.addEventListener('click', () => {
          armedField = (armedField === k) ? null : k;
          renderPickButtons();
          document.body.classList.toggle('map-armed', !!armedField);
        });
        row.appendChild(btn);
      });
    }

    // ── Map click → place point ───────────────────────────────
    map.on('click', e => {
      if (!armedField || !currentDir) return;
      const { lat, lng } = e.latlng;
      // Round to 6 decimals (sub-meter)
      const latR = Math.round(lat * 1e6) / 1e6;
      const lngR = Math.round(lng * 1e6) / 1e6;
      if (!workData[currentDir]) workData[currentDir] = {};
      workData[currentDir][armedField] = { lat: latR, lng: lngR };
      placePickMarker(currentDir, armedField, latR, lngR);
      // Auto-advance to next unfilled field
      const idx = POINT_KEYS.indexOf(armedField);
      const nextField = POINT_KEYS.slice(idx + 1).find(k => !workData[currentDir][k]);
      armedField = nextField || null;
      document.body.classList.toggle('map-armed', !!armedField);
      renderPickButtons();
      renderDirTabs();
      updateJSONOutput();
    });

    function placePickMarker(dir, field, lat, lng) {
      if (!pickMarkers[dir]) pickMarkers[dir] = {};
      if (pickMarkers[dir][field]) map.removeLayer(pickMarkers[dir][field]);
      const labelInfo = POINT_LABELS[field];
      const marker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: '',
          html: `<div class="pick-marker ${labelInfo.short}">${labelInfo.num}</div>`,
          iconSize: [22, 22], iconAnchor: [11, 11],
        }),
        zIndexOffset: 200,
      }).addTo(map);
      marker.bindTooltip(`${dir} · ${labelInfo.label}`, { direction: 'top' });
      pickMarkers[dir][field] = marker;
    }
    function clearAllPickMarkers() {
      Object.values(pickMarkers).forEach(byDir => {
        Object.values(byDir).forEach(m => map.removeLayer(m));
      });
      pickMarkers = {};
    }

    // ── JSON output ───────────────────────────────────────────
    function updateJSONOutput() {
      const ta = document.getElementById('json-out');
      if (!currentToll || activeDirs.length === 0) { ta.value = ''; return; }
      const lines = ['bypass_directions: {'];
      activeDirs.forEach((d, i) => {
        const dd = workData[d] || {};
        const filled = POINT_KEYS.every(k => dd[k]);
        if (!filled) {
          lines.push(`  // ${d}: incomplete (${POINT_KEYS.filter(k => dd[k]).length}/4 picked)`);
          return;
        }
        const dirLabelMap = { north: 'Northbound', south: 'Southbound', east: 'Eastbound', west: 'Westbound' };
        const names = dd.__names || {};
        lines.push(`  ${d}: {`);
        lines.push(`    label: "${dirLabelMap[d]}",`);
        if (names.exit_name || names.entry_name) {
          lines.push(`    exit_name: "${(names.exit_name || '').replace(/"/g, '\\"')}", entry_name: "${(names.entry_name || '').replace(/"/g, '\\"')}",`);
        }
        lines.push(`    pre_exit:   { lat: ${dd.pre_exit.lat},   lng: ${dd.pre_exit.lng} },`);
        lines.push(`    off_ramp:   { lat: ${dd.off_ramp.lat},   lng: ${dd.off_ramp.lng} },`);
        lines.push(`    on_ramp:    { lat: ${dd.on_ramp.lat},    lng: ${dd.on_ramp.lng} },`);
        lines.push(`    post_merge: { lat: ${dd.post_merge.lat}, lng: ${dd.post_merge.lng} },`);
        lines.push(`    minutes: 10,`);
        lines.push(`    via: [],`);
        lines.push(`    confidence: "verified"`);
        lines.push(`  },`);
      });
      lines.push('},');
      ta.value = lines.join('\n');
    }

    // ── Clear current direction ───────────────────────────────
    document.getElementById('clear-dir-btn').addEventListener('click', () => {
      if (!currentDir) return;
      if (!confirm(`Clear all 4 picks for ${currentDir}?`)) return;
      delete workData[currentDir];
      if (pickMarkers[currentDir]) {
        Object.values(pickMarkers[currentDir]).forEach(m => map.removeLayer(m));
        delete pickMarkers[currentDir];
      }
      armedField = null;
      document.body.classList.remove('map-armed');
      renderPickButtons();
      renderDirTabs();
      renderNameFields();
      updateJSONOutput();
    });

    // ── Copy ──────────────────────────────────────────────────
    document.getElementById('copy-btn').addEventListener('click', () => {
      const ta = document.getElementById('json-out');
      ta.select();
      document.execCommand('copy');
      const btn = document.getElementById('copy-btn');
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });

    // ── Save & next ───────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', () => {
      if (!currentToll) return;
      // Validate: at least one direction fully filled
      const completed = activeDirs.filter(d => POINT_KEYS.every(k => workData[d] && workData[d][k]));
      if (completed.length === 0) {
        alert('Need at least 1 complete direction (4/4 points) before saving.');
        return;
      }
      session[currentToll.id] = {
        workData: JSON.parse(JSON.stringify(workData)),
        activeDirs: activeDirs.slice(),
        output: document.getElementById('json-out').value
      };
      persistSession();
      renderDropdown();
      renderSessionLog();
      // Advance to next un-saved toll
      const idx = inScope.findIndex(t => t.id === currentToll.id);
      const next = inScope.slice(idx + 1).find(t => !session[t.id]) || inScope.find(t => !session[t.id]);
      if (next) {
        sel.value = next.id;
        loadToll(next.id);
      } else {
        alert('All tolls in scope saved!');
        hideTollArea();
        sel.value = '';
      }
    });

    // ── Session log ───────────────────────────────────────────
    function renderSessionLog() {
      const log = document.getElementById('session-log');
      const entries = Object.keys(session);
      if (entries.length === 0) {
        log.innerHTML = 'No tolls saved yet.';
        return;
      }
      log.innerHTML = entries.map(id => {
        const t = tolls.find(x => x.id === id);
        return `<span class="log-toll done">✓ ${id} — ${t ? t.name_en : '(missing)'}</span>`;
      }).join('');
    }
    renderSessionLog();

    // ── Export session ────────────────────────────────────────
    document.getElementById('export-btn').addEventListener('click', () => {
      const entries = Object.entries(session);
      if (entries.length === 0) { alert('No saved tolls to export.'); return; }
      const lines = ['// mydiodia ramp-picker session — ' + new Date().toISOString()];
      lines.push('// Paste each block into its toll record in data/tolls.js, replacing the existing bypass_directions: null or approximate block.\n');
      entries.forEach(([id, data]) => {
        lines.push('// ── ' + id + ' ──');
        lines.push(data.output || '// (no output stored)');
        lines.push('');
      });
      const text = lines.join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ramp-picker-session-' + new Date().toISOString().slice(0, 10) + '.txt';
      a.click();
    });

    // ── Reset ─────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('Erase all saved progress in this session? This cannot be undone.')) return;
      Object.keys(session).forEach(k => delete session[k]);
      persistSession();
      renderDropdown();
      renderSessionLog();
      hideTollArea();
      sel.value = '';
    });
  </script>
</body>
</html>
